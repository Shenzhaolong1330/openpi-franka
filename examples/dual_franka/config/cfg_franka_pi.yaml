model:
  name: pi05_droid_finetune_dual_franka
  checkpoint_dir: /home/deepcybo/.cache/openpi/openpi-assets/checkpoints/pi05_droid_finetune_dual_franka/pi4dualfranka/45000

cameras:
  left_wrist_cam_serial: "347622074336"  # Update with your left wrist camera serial
  right_wrist_cam_serial: "337322072568"  # Update with your right wrist camera serial
  exterior_cam_serial: "348522072761"     # Update with your head/exterior camera serial
  fps: 30

video:
  fps: 7
  visualize: true

robot:
  ip: 172.16.0.1
  port: 4242
  # Initial poses for both arms (7 joint positions each)
  left_initial_pose: [0.00761213, -0.39547789, -0.03788094, -2.44777918, 0.09107678, 1.99305379, -1.65751863]
  right_initial_pose: [-0.00761213, -0.39547789, 0.03788094, -2.44777918, -0.09107678, 1.99305379, 1.65751863]
  action_fps: 30
  action_horizon: 10

gripper:
  close_threshold: 0.7
  gripper_force: 10
  gripper_speed: 0.1
  gripper_reverse: false

# Action mode configuration for dual franka
# Dual franka uses delta_ee mode with 14D actions:
# - 6D left arm delta EE pose
# - 6D right arm delta EE pose
# - 1D left gripper command
# - 1D right gripper command
action_mode:
  mode: delta_ee
  ee_pos_action_scale: 10.0  # model translation outputs are usually 0.000-0.002m
  ee_rot_action_scale: 5.0   # keep rotation scaling lower than translation
  max_pos_delta: 0.03        # meters per control step, safety clip
  max_rot_delta: 0.12        # radians per control step, safety clip

task:
  description: Pick up all the objects into the basket and seal the basket.

  # Task description for the policy
